
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <radialGradient id="headGrad" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#d9d7ff"/>
      <stop offset="45%" stop-color="#b8b5f3"/>
      <stop offset="75%" stop-color="#9b97e6"/>
      <stop offset="100%" stop-color="#7f7bd6"/>
    </radialGradient>

    <radialGradient id="bodyGrad" cx="40%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f4f4ff"/>
      <stop offset="100%" stop-color="#e8e8fb"/>
    </radialGradient>

    <radialGradient id="blushGrad">
      <stop offset="0%" stop-color="#ffc6da" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffc6da" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow -->
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#8f8bd9" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Body -->
  <ellipse cx="315" cy="345" rx="165" ry="115"
           fill="url(#bodyGrad)" filter="url(#shadow)"/>

  <!-- Tail -->
  <ellipse cx="435" cy="375" rx="42" ry="32"
           fill="#ececff"/>

  <!-- Head -->
  <circle cx="210" cy="260" r="140"
          fill="url(#headGrad)" filter="url(#shadow)"/>

  <!-- Ears -->
  <path d="M95 170 Q140 40 210 165 Z"
        fill="url(#headGrad)"/>
  <path d="M210 165 Q280 40 325 170 Z"
        fill="url(#headGrad)"/>

  <!-- Inner Ear Glow -->
  <path d="M120 165 Q150 90 200 160 Z"
        fill="#ffffff" opacity="0.2" filter="url(#softGlow)"/>
  <path d="M220 160 Q270 90 300 165 Z"
        fill="#ffffff" opacity="0.2" filter="url(#softGlow)"/>

  <!-- Eyes -->
  <path d="M165 265 Q190 290 215 265"
        stroke="#4f4da8" stroke-width="8"
        stroke-linecap="round" fill="none"/>
  <path d="M215 265 Q240 290 265 265"
        stroke="#4f4da8" stroke-width="8"
        stroke-linecap="round" fill="none"/>

  <!-- Eye highlights -->
  <circle cx="185" cy="258" r="4" fill="#ffffff" opacity="0.8"/>
  <circle cx="245" cy="258" r="4" fill="#ffffff" opacity="0.8"/>

  <!-- Blush -->
  <ellipse cx="155" cy="295" rx="40" ry="22"
           fill="url(#blushGrad)"/>
  <ellipse cx="275" cy="295" rx="40" ry="22"
           fill="url(#blushGrad)"/>

  <!-- Mouth -->
  <path d="M200 305 Q210 315 220 305"
        stroke="#4f4da8"
        stroke-width="5"
        stroke-linecap="round"
        fill="none"/>

  <!-- Whiskers -->
  <path d="M110 285 Q135 280 160 285"
        stroke="#ffffff" stroke-width="7"
        stroke-linecap="round" fill="none"/>
  <path d="M110 305 Q135 300 160 305"
        stroke="#ffffff" stroke-width="7"
        stroke-linecap="round" fill="none"/>
  <path d="M260 285 Q285 280 310 285"
        stroke="#ffffff" stroke-width="7"
        stroke-linecap="round" fill="none"/>
  <path d="M260 305 Q285 300 310 305"
        stroke="#ffffff" stroke-width="7"
        stroke-linecap="round" fill="none"/>

  <!-- Soft face highlight -->
  <ellipse cx="190" cy="220" rx="70" ry="45"
           fill="#ffffff" opacity="0.12" filter="url(#softGlow)"/>

</svg>
